name: Strip Comments and Update Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  strip-comments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Remove // comments from .c and .h files
        run: |
          find . -type f \( -name "*.c" -o -name "*.h" \) | while read file; do
            echo "Processing $file"
            sed -i '/^[[:space:]]*\/\//d' "$file"
          done

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Commit changes
        run: |
          git add .
          git commit -m "Remove // comments from source files" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push
