name: Clone + Build + Test clox VM

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  test-clox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git

      - name: Clone Crafting Interpreters
        run: |
          git clone --depth 1 https://github.com/munificent/craftinginterpreters.git ci

      - name: Build clox VM (manual gcc compile)
        run: |
          gcc -std=c99 -Wall -Wextra \
            ci/c/*.c \
            -o clox

      - name: Create test program
        run: |
          echo 'print 1 + 2 * 3;' > test.lox

      - name: Run clox VM
        run: |
          ./clox test.lox > output.txt

      - name: Verify output
        run: |
          EXPECTED="7"
          ACTUAL=$(cat output.txt)

          echo "Expected: $EXPECTED"
          echo "Actual: $ACTUAL"

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Test failed"
            exit 1
          fi

          echo "Test passed"
