name: Build TeiA Executable

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Build TeiA.exe
        shell: bash
        run: |
          gcc -std=c99 -O2 -Wall -Wextra \
            *.c \
            -o TeiA.exe

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TeiA-Windows
          path: TeiA.exe
