name: Build TeiA Executable

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Build TeiA.exe
        shell: msys2 {0}
        run: |
          gcc -std=c99 -O2 -Wall -Wextra *.c -o TeiA.exe

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TeiA-Windows
          path: TeiA.exe
