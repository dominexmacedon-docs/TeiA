name: Compile and Test TeiA VM

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build TeiA
        run: |
          gcc -std=c99 -O2 -Wall -Wextra \
            *.c \
            -o TeiA

      - name: Create test program
        run: |
          echo 'show "Hello";' > hello.teia

      - name: Run TeiA program
        run: |
          ./TeiA hello.teia > output.txt

      - name: Verify output
        run: |
          echo "Output:"
          cat output.txt

          if ! grep -q "Hello" output.txt; then
            echo "Test failed: expected Hello"
            exit 1
          fi

          echo "Test passed"
